<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Glorbgenesis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d12; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #d5d8e0; font-size: 13px; }
  #game { display: block; cursor: crosshair; touch-action: none; }

  .panel {
    position: fixed; background: rgba(16, 19, 27, 0.88);
    border: 1px solid #262b38; border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  /* topo */
  #topbar {
    top: 8px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px;
    padding: 6px 14px; white-space: nowrap; z-index: 10;
  }
  #topbar .stat { color: #9aa3b5; }
  #topbar .stat b { color: #e8ebf2; font-weight: 600; }
  #seedText { color: #7f8aa3; font-family: monospace; }
  #seedInput {
    width: 110px; background: #0d1017; border: 1px solid #2a3040; color: #cfd4e0;
    border-radius: 5px; padding: 3px 6px; font-family: monospace; font-size: 12px;
  }
  button {
    background: #1b2130; color: #cfd4e0; border: 1px solid #2c3346;
    border-radius: 6px; padding: 4px 9px; cursor: pointer; font-size: 12px;
  }
  button:hover { background: #252d40; }
  button.active { background: #3a4666; border-color: #5a6a99; color: #fff; }

  /* paleta */
  #paletteWrap {
    left: 8px; top: 50%; transform: translateY(-50%);
    padding: 8px; z-index: 10; display: flex; flex-direction: column; gap: 6px; align-items: center;
  }
  #palette { display: flex; flex-direction: column; gap: 4px; }
  .palbtn {
    width: 38px; height: 38px; padding: 3px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .palbtn canvas { pointer-events: none; }
  .palbtn.locked { opacity: 0.35; filter: grayscale(1); }
  .palbtn .cd {
    position: absolute; left: 0; bottom: 0; width: 100%; height: 0%;
    background: rgba(10, 12, 18, 0.75); pointer-events: none;
  }
  #brushRow { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #8a93a8; font-size: 11px; }
  #brushSize { width: 36px; writing-mode: vertical-lr; direction: rtl; height: 70px; }

  /* feed de eventos */
  #feed {
    position: fixed; right: 10px; top: 54px; width: 300px; z-index: 10;
    display: flex; flex-direction: column; gap: 5px; pointer-events: none;
  }
  .feeditem {
    background: rgba(16, 19, 27, 0.85); border-left: 3px solid #888;
    border-radius: 4px; padding: 5px 9px; font-size: 12px; line-height: 1.35;
    animation: feedin 0.25s ease-out; transition: opacity 3s;
  }
  .feeditem.fading { opacity: 0; }
  @keyframes feedin { from { transform: translateX(30px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* inspetor */
  #inspector {
    right: 10px; bottom: 10px; width: 300px; padding: 12px; z-index: 11;
  }
  #inspector.hidden { display: none; }
  #inspector .row { display: flex; gap: 12px; }
  #portrait { border-radius: 8px; border: 1px solid #262b38; flex-shrink: 0; }
  #inspName { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 3px; }
  #inspAge, #inspStats, #inspAbsorbed { color: #9aa3b5; font-size: 11.5px; margin-top: 3px; }
  #inspFaction { font-size: 12px; margin-top: 3px; }
  #inspTraits { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .trait {
    border: 1px solid #555; border-radius: 10px; padding: 1px 8px;
    font-size: 11px; color: #d5d8e0; background: rgba(0,0,0,0.3);
  }
  .dim { color: #667; font-size: 11px; }
  #btnCloseInspector { position: absolute; top: 6px; right: 6px; padding: 1px 7px; }

  #hint {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    color: #5a6377; font-size: 11px; z-index: 5; pointer-events: none;
  }

  #homeLink {
    position: fixed; top: 8px; left: 8px; z-index: 10;
    padding: 6px 12px; text-decoration: none; color: #9aa3b5;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
  }
  #homeLink:hover { color: #fff; }
  #homeLink .dot { color: #7878ff; }

  /* touch: mostra a dica certa para cada tipo de ponteiro */
  #hint .coarse { display: none; }
  @media (pointer: coarse) {
    #hint .fine { display: none; }
    #hint .coarse { display: inline; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<a id="homeLink" class="panel" href="/" title="voltar ao portal">estel<span class="dot">.</span>games</a>

<div id="topbar" class="panel">
  <span id="seedText">seed —</span>
  <input id="seedInput" placeholder="seed…">
  <button id="btnNewWorld">Novo Mundo</button>
  <span class="stat"><b id="pop">pop 1</b></span>
  <span class="stat"><b id="factions">facções 0</b></span>
  <span class="stat">⏱ <b id="worldTime">0:00</b></span>
  <span>
    <button class="speedbtn" data-speed="0">⏸</button>
    <button class="speedbtn active" data-speed="1">1×</button>
    <button class="speedbtn" data-speed="2">2×</button>
    <button class="speedbtn" data-speed="4">4×</button>
  </span>
</div>

<div id="paletteWrap" class="panel">
  <div id="palette"></div>
  <div id="brushRow">
    <span>pincel <b id="brushSizeVal">2</b></span>
    <input id="brushSize" type="range" min="1" max="4" value="2">
  </div>
</div>

<div id="feed"></div>

<div id="inspector" class="panel hidden">
  <button id="btnCloseInspector">✕</button>
  <div class="row">
    <canvas id="portrait" width="110" height="110"></canvas>
    <div>
      <div id="inspName"></div>
      <div id="inspAge"></div>
      <div id="inspFaction"></div>
      <div id="inspStats"></div>
    </div>
  </div>
  <div id="inspTraits"></div>
  <div id="inspAbsorbed"></div>
</div>

<div id="hint"><span class="fine">arraste com botão direito para mover · scroll para zoom · clique com um elemento para despejar</span><span class="coarse">arraste com 1 dedo para mover a câmera · 2 dedos: pan + pinça para zoom · com um elemento, o dedo despeja</span></div>

// PRNG seedado (mulberry32). Math.random() é proibido na simulação —
// todo aleatório passa por instâncias de RNG derivadas da seed do mundo.

function hashString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

class RNG {
  constructor(seed) {
    this.s = (seed >>> 0) || 1;
  }

  // mulberry32
  next() {
    this.s = (this.s + 0x6D2B79F5) >>> 0;
    let t = this.s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }

  range(a, b) { return a + this.next() * (b - a); }
  int(a, b) { return Math.floor(this.range(a, b + 1)); } // inclusivo
  pick(arr) { return arr[Math.floor(this.next() * arr.length)]; }
  chance(p) { return this.next() < p; }
  angle() { return this.next() * Math.PI * 2; }
  sign() { return this.next() < 0.5 ? -1 : 1; }

  // nova seed derivada, para dar RNG individual a criaturas/subsistemas
  fork() { return new RNG(Math.floor(this.next() * 4294967296)); }

  weighted(entries) {
    // entries: [{w: number, ...}]
    let total = 0;
    for (const e of entries) total += e.w;
    let r = this.next() * total;
    for (const e of entries) {
      r -= e.w;
      if (r <= 0) return e;
    }
    return entries[entries.length - 1];
  }

  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(this.next() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
}

return { hashString, RNG };

const MIDS = ['rb', 'lm', 'zz', 'mb', 'nk', 'rg', 'bl', 'p', 'g', 'd', 'lb', 'v', 'x', 'squ', 'rp'];
const ENDS = ['p', 'b', 'rp', 'sh', 'x', 'm', 'g', 'k', 'lo', 'ba', 'zo', 'ni', 'ti', 'lu', 'ra', ''];

function creatureName(rng) {
  let n = rng.pick(ONSETS) + rng.pick(VOWELS);
  if (rng.chance(0.55)) n += rng.pick(MIDS) + rng.pick(VOWELS);
  n += rng.pick(ENDS);
  return n;
}

const FACTION_ROOTS = ['Brasa', 'Gelume', 'Vidral', 'Ferrume', 'Aurax', 'Limo', 'Petra', 'Ventania', 'Fulgor', 'Umbra', 'Toxina', 'Cintila', 'Rocha', 'Bruma', 'Chispa', 'Orvale', 'Gluma', 'Zarpa'];
const FACTION_SUFFIX = ['', ' Rubra', ' Antiga', ' Errante', ' Prima', ' do Norte', ' Voraz', ' Serena', ' Furiosa', ' Oculta', ' Dourada', ' Gelada'];

function factionName(rng, used) {
  for (let i = 0; i < 40; i++) {
    const n = rng.pick(FACTION_ROOTS) + rng.pick(FACTION_SUFFIX);
    if (!used.has(n)) { used.add(n); return n; }
  }
  // fallback: nome sintético único
  const n = rng.pick(FACTION_ROOTS) + '-' + rng.int(10, 99);
  used.add(n);
  return n;
}

return { creatureName, factionName };

// Absorve `elem`: rola uma mutação nova (sem repetir) no RNG da criatura.
function absorbElement(creature, elem, game) {
  creature.absorbed[elem] = (creature.absorbed[elem] || 0) + 1;
  const pool = MUTATION_POOLS[elem] || [];
  const owned = new Set(creature.traits.map(t => t.id));
  const options = pool.filter(m => !owned.has(m.id));
  const rng = creature.rng;
  if (options.length === 0) {
    // já tem tudo desse elemento: só reforça stats levemente
    creature.stats.maxHp += 2;
    creature.hp += 2;
    return null;
  }
  const mut = options[Math.floor(rng.next() * options.length)];
  mut.apply(creature);
  creature.traits.push({ id: mut.id, name: mut.name, element: elem });
  creature.refreshDominant();
  game.feed(`✨ ${creature.name} absorveu ${elemName(elem)} e ganhou ${mut.name}!`, '#c9a6ff');
  return mut;
}

return { MUTATION_POOLS, absorbElement };

// ==== src/building.js ====
__m.building = (() => {
// Construções procedurais: estruturas, objetos, armas e veículos.
// O que construir é sorteado de uma tabela ponderada por elemento carregado + temperamento.

const { E, elemName, elemColor, FLAMMABLE, STRUCTURAL } = __m.elements;
const { TILE, T } = __m.world;
const BUILD_THRESHOLD = 2;

const TYPE_NAMES = {
  wall: 'Parede', floor: 'Piso', tower: 'Torre', house: 'Casa', bridge: 'Ponte',
  campfire: 'Fogueira', totem: 'Totem', chest: 'Baú', sculpture: 'Escultura',
};

const HP_BY_ELEM = {
  [E.WOOD]: 30, [E.STONE]: 60, [E.GLASS]: 18, [E.ICE]: 24, [E.METAL]: 80,
  [E.GOLD]: 40, [E.DIAMOND]: 150, [E.SLIME]: 26, [E.WATER]: 20, [E.FIRE]: 20,
  [E.AIR]: 15, [E.POISON]: 22, [E.LIGHTNING]: 25,
};

let nextBid = 1;

class Building {
  constructor(game, type, tx, ty, elem, faction, builder) {
    this.id = nextBid++;
    this.type = type;
    this.tx = tx; this.ty = ty;
    this.x = tx * TILE + TILE / 2;
    this.y = ty * TILE + TILE / 2;
    this.element = elem;
    this.faction = faction || null;
    this.maxHp = (HP_BY_ELEM[elem] || 30) * (type === 'tower' ? 1.5 : 1);
    this.hp = this.maxHp;
    this.burning = 0;
    this.gold = type === 'chest' ? 1 : 0;
    this.seed = builder ? Math.floor(builder.rng.next() * 4294967296) : game.envRng.int(0, 1e9);
    this.height = type === 'tower' ? 2.2 : type === 'house' ? 1.4 : 1;
  }

  get label() { return `${TYPE_NAMES[this.type]} de ${elemName(this.element)}`; }

  update(game, dt) {
    if (this.burning > 0) {
      this.burning -= dt;
      this.hp -= 9 * dt;
      if (game.fxRng.chance(dt * 6)) game.flameAt(this.x + game.fxRng.range(-5, 5), this.y + game.fxRng.range(-6, 2), game.fxRng);
      // fogo se espalha para construções/depósitos inflamáveis vizinhos
      if (game.fxRng.chance(dt * 1.2)) {
        const world = game.world;
        const nx = this.tx + game.envRng.int(-1, 1), ny = this.ty + game.envRng.int(-1, 1);
        if (world.inBounds(nx, ny)) {
          const ni = world.idx(nx, ny);
          const nb = world.buildingAt.get(ni);
          if (nb && FLAMMABLE.has(nb.element)) world.igniteBuilding(nb, game);
          else if (world.dep[ni] === E.WOOD || world.dep[ni] === E.SLIME) world.setDep(ni, E.FIRE, game.envRng.range(3, 5));
        }
      }
    }
    if (this.hp <= 0) game.removeBuilding(this, this.burning > 0 ? 'queimou até o chão' : 'foi destruída');
  }
}

function buildOptions(c, elem, waterNearby) {
  const t = c.temperament;
  const opts = [];
  const add = (type, w, elems) => {
    if (w > 0 && (!elems || elems.includes(elem))) opts.push({ type, w });
  };
  const structural = STRUCTURAL.has(elem);
  if (structural) {
    add('wall', 1 + t.industriousness);
    add('floor', 0.7 + t.industriousness * 0.5);
  }
  add('tower', 0.5 + t.aggression * 0.9, [E.STONE, E.METAL]);
  add('house', 1 + t.sociability * 1.2, [E.WOOD, E.STONE]);
  add('campfire', 0.8, [E.WOOD]);
  if (waterNearby) add('bridge', 1.2, [E.WOOD, E.STONE]);
  add('totem', c.faction ? 1.0 : 0.25);
  add('chest', t.greed * 1.6, [E.WOOD, E.GOLD]);
  add('sculpture', 0.5 + t.curiosity * 0.9);
  if (!c.weapon) add('weapon', 0.5 + t.aggression * 1.8, [E.GLASS, E.METAL, E.DIAMOND]);
  if (!c.vehicle) add('vehicle', 0.3 + t.curiosity * 0.7, [E.METAL, E.WOOD, E.ICE, E.AIR]);
  return opts;
}

const WEAPON_STATS = {

const VEHICLE_STATS = {

// Consome a carga da criatura e materializa uma construção (ou equipa arma/veículo).
function attemptBuild(game, c, tx, ty) {
  // elemento mais carregado (precisa ter o suficiente dele)
  let elem = -1, n = 0;
  for (const [k, v] of Object.entries(c.carry)) if (v > n) { n = v; elem = +k; }
  if (elem === -1 || n < BUILD_THRESHOLD) return;
  const world = game.world;

  // ponte precisa de água por perto
  let waterTile = null;
  outer: for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const x = tx + dx, y = ty + dy;
      if (world.inBounds(x, y) && world.terrain[world.idx(x, y)] === T.WATER && !world.buildingAt.has(world.idx(x, y))) {
        waterTile = { x, y }; break outer;
      }
    }
  }

  const opts = buildOptions(c, elem, !!waterTile);
  if (opts.length === 0) return;
  const choice = c.rng.weighted(opts);

      let yy = py + 14;

function mulberryLite(seed) {

      const step = moving ? Math.sin(c.animPhase * 2.2 + i * 1.7) * 2 : Math.sin(t * 2 + i) * 0.6;
      const lx = Math.cos(a) * sx, ly = Math.sin(a) * sy;

      const a = (i / 24) * Math.PI * 2;

    ctx.save();

    ctx.strokeStyle = bp.patternColor; ctx.lineWidth = 2; ctx.globalAlpha = 0.6 * bp.alpha;

  }

  // placas

    ctx.fillStyle = 'rgba(190,200,212,0.9)';
    for (let i = 0; i < bp.plates; i++) {
      const a = hd + Math.PI + (i - (bp.plates - 1) / 2) * 0.7;
      ctx.save();

    ctx.fillStyle = bp.spikeColor || '#ddd';
    for (let i = 0; i < bp.spikes; i++) {
      const a = bp.phase + (i / bp.spikes) * Math.PI * 2;
      const bx = Math.cos(a) * sx * 0.9, by = Math.sin(a) * sy * 0.9;
      ctx.beginPath();
      ctx.moveTo(bx + Math.cos(a + 1.7) * 2, by + Math.sin(a + 1.7) * 2);
      ctx.lineTo(bx + Math.cos(a) * 5, by + Math.sin(a) * 5);
      ctx.lineTo(bx + Math.cos(a - 1.7) * 2, by + Math.sin(a - 1.7) * 2);
      ctx.closePath(); ctx.fill();
    }

  // antenas
  if (bp.antennae > 0) {
    ctx.strokeStyle = bp.antennaColor || bodyColor; ctx.lineWidth = 1.5;
    ctx.fillStyle = bp.antennaColor || bodyColor;
    for (let i = 0; i < bp.antennae; i++) {
      const a = hd + (i - (bp.antennae - 1) / 2) * 0.5;
      const ex = Math.cos(a) * (sx + 6), ey = Math.sin(a) * (sy + 6) - 4;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * sx * 0.6, Math.sin(a) * sy * 0.6 - 2);
      ctx.quadraticCurveTo(ex * 0.7, ey * 0.7 - 3, ex, ey);
      ctx.stroke();
      ctx.beginPath(); ctx.arc(ex, ey, 1.6, 0, 7); ctx.fill();

  // olhos

  for (let i = 0; i < bp.eyes; i++) {
    const off = bp.eyes === 1 ? 0 : (i / (bp.eyes - 1) - 0.5) * eyeSpread;
    const a = hd + off;
    const ex = Math.cos(a) * sx * 0.5, ey = Math.sin(a) * sy * 0.5 - s * 0.15;
    const er = s * (bp.eyes > 3 ? 0.16 : 0.22);
    ctx.fillStyle = '#f2f2f2';
    ctx.beginPath(); ctx.arc(ex, ey, er, 0, 7); ctx.fill();
    ctx.fillStyle = '#15151c';
    ctx.beginPath(); ctx.arc(ex + Math.cos(hd) * er * 0.4, ey + Math.sin(hd) * er * 0.4, er * 0.5, 0, 7); ctx.fill();

  // arma equipada
  if (c.weapon && !portrait) {
    const wa = hd + 0.8;
    const wc = elemColor(c.weapon.element);
    ctx.strokeStyle = wc; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(wa) * sx * 0.8, Math.sin(wa) * sy * 0.8);
    ctx.lineTo(Math.cos(wa) * (sx + 9), Math.sin(wa) * (sy + 9) - 4);
    ctx.stroke();
    ctx.fillStyle = wc;
    ctx.beginPath();
    const tipx = Math.cos(wa) * (sx + 9), tipy = Math.sin(wa) * (sy + 9) - 4;
    ctx.moveTo(tipx, tipy - 3); ctx.lineTo(tipx + 2.5, tipy + 2); ctx.lineTo(tipx - 2.5, tipy + 2);
    ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

function drawVehicle(ctx, c, s, t) {
  const v = c.vehicle;

    + (c.weapon ? ` · ${c.weapon.name}` : '') + (c.vehicle ? ` · ${c.vehicle.name}` : '');
  const tr = document.getElementById('inspTraits');
  tr.innerHTML = '';
  if (c.traits.length === 0) tr.innerHTML = '<span class="dim">nenhum trait ainda</span>';
  for (const t of c.traits) {
    const s = document.createElement('span');
    s.className = 'trait';

      px = nx; py = ny;
    }
    this.spawnP(x, y, 0, 0, 0.25, 'rgba(255,240,150,0.9)', r * 0.7);
    for (const c of this.hash.query(x, y, r)) {
      if (!c.immunities.has(E.LIGHTNING)) c.hurt(dmg, null, 'eletrocutado por um raio');
    }
  }
  notifyFusion(elem, px, py) {
    if (this.discovered.has(elem)) return;
    this.discovered.add(elem);
    try { localStorage.setItem('glorb_fusions', JSON.stringify([...this.discovered])); } catch (e) {}
    this.feed(`🧪 Elemento descoberto: ${elemName(elem)}!`, elemColor(elem));
    this.onDiscover && this.onDiscover(elem);
  }
  notifyGold(x, y) {
    const tx = Math.floor(x / TILE), ty = Math.floor(y / TILE);
    for (const c of this.hash.query(x, y, 140)) {
      if (c.temperament.greed > 0.45 && c.state !== 'fight' && c.state !== 'flee') {
        c.seekTile = { tx, ty, elem: E.GOLD, mode: c.temperament.curiosity > c.temperament.industriousness ? 'absorb' : 'collect' };
        c.state = 'seek';
      }
    }
  }

  // ---- tick de simulação -------------------------------------------------
  tick(dt) {
    this.time += dt;
    this.hash.rebuild(this.creatures);

    const cs = this.creatures.slice();
    for (const c of cs) if (c.alive) c.update(dt);

    const bs = this.buildings.slice();
    for (const b of bs) b.update(this, dt);

    this.envAcc += dt;
    if (this.envAcc >= 0.25) { this.world.envTick(this, this.envAcc); this.envAcc = 0; }

    this.societyAcc += dt;
    if (this.societyAcc >= 8) { societyTick(this); this.societyAcc = 0; }

    for (const [k, v] of Object.entries(this.cooldowns)) {
      if (v > 0) this.cooldowns[k] = Math.max(0, v - dt);
    }

    // partículas
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life -= dt;
      if (p.life <= 0) { this.particles.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt;
    }
  }

  pour(elem, wx, wy) {
    const def = ELEMENTS[elem];
    if (def.cooldown > 0) {
      if ((this.cooldowns[elem] || 0) > 0) return;
      this.cooldowns[elem] = def.cooldown;
    }
    const tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
    this.world.pour(elem, tx, ty, elem === E.DIAMOND ? 0 : this.brush.radius, this.pourRng, this);
  }
}

// ---------------------------------------------------------------------------
// Bootstrap + loop + input
// ---------------------------------------------------------------------------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let game = null;
const cam = { x: 0, y: 0, zoom: 1.6 };

function newSeed() {
  // fora da simulação: só para escolher a seed inicial do mundo
  return (Date.now() ^ (performance.now() * 1000)) >>> 0;
}

function startWorld(seedStr) {
  let seed, text;
  if (seedStr) {
    seed = /^\d+$/.test(seedStr) ? (parseInt(seedStr, 10) >>> 0) : hashString(seedStr);
    text = seedStr;
  } else {
    seed = newSeed();
    text = String(seed);
  }
  game = new Game(seed, text);
  window.__game = game; // handle de debug/observação (não usado pela simulação)
  setGame(game);
  cam.zoom = 1.6;
  cam.x = game.first.x - canvas.width / 2 / cam.zoom;
  cam.y = game.first.y - canvas.height / 2 / cam.zoom;
  clampCam();
  game.feed(`🌱 O Primeiro, ${game.first.name}, surgiu no mundo (seed ${text})`, '#a0e8a0');
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function clampCam() {
  const W = game.world.w * TILE, H = game.world.h * TILE;
  const vw = canvas.width / cam.zoom, vh = canvas.height / cam.zoom;
  cam.x = Math.max(-vw * 0.3, Math.min(W - vw * 0.7, cam.x));
  cam.y = Math.max(-vh * 0.3, Math.min(H - vh * 0.7, cam.y));
}

function toWorld(mx, my) {
  return { x: cam.x + mx / cam.zoom, y: cam.y + my / cam.zoom };
}

let pouring = false, panning = false, lastMx = 0, lastMy = 0, pourCd = 0;

function pickCreature(w) {
  let best = null, bd = 18 / cam.zoom + 8;
  for (const c of game.creatures) {
    const d = Math.hypot(c.x - w.x, c.y - w.y);
    if (d < bd) { bd = d; best = c; }
  }
  return best;
}

canvas.addEventListener('mousedown', e => {
  const w = toWorld(e.offsetX, e.offsetY);
  if (e.button === 1 || e.button === 2) { panning = true; }
  else if (e.button === 0) {
    if (game.tool === 'inspect') {
      selectCreature(pickCreature(w));
    } else {
      pouring = true;
      game.pour(game.tool, w.x, w.y);
      pourCd = 0.08;
    }
  }
  lastMx = e.offsetX; lastMy = e.offsetY;
});
window.addEventListener('mouseup', () => { pouring = false; panning = false; });
canvas.addEventListener('mouseleave', () => { game.brush.visible = false; });
canvas.addEventListener('mousemove', e => {
  const w = toWorld(e.offsetX, e.offsetY);
  game.brush.x = w.x; game.brush.y = w.y; game.brush.visible = true;
  if (panning) {
    cam.x -= (e.offsetX - lastMx) / cam.zoom;
    cam.y -= (e.offsetY - lastMy) / cam.zoom;
    clampCam();
  }
  lastMx = e.offsetX; lastMy = e.offsetY;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const before = toWorld(e.offsetX, e.offsetY);
  cam.zoom = Math.max(0.5, Math.min(5, cam.zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12)));
  const after = toWorld(e.offsetX, e.offsetY);
  cam.x += before.x - after.x;
  cam.y += before.y - after.y;
  clampCam();
}, { passive: false });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ---- touch (celular) -------------------------------------------------------
// 1 dedo: na lupa arrasta a câmera (toque curto seleciona); com um elemento,
// despeja. 2 dedos: sempre movem a câmera, com pinça para zoom.
let touchMode = null; // 'pan' | 'tool' | 'pinch'
let tapX = 0, tapY = 0, tapTime = 0, tapMoved = false;
let pinchDist = 0;

function touchPos(t) {
  const r = canvas.getBoundingClientRect();
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); // bloqueia gestos do browser e eventos de mouse emulados
  if (e.touches.length === 1) {
    const p = touchPos(e.touches[0]);
    lastMx = p.x; lastMy = p.y;
    tapX = p.x; tapY = p.y; tapTime = performance.now(); tapMoved = false;
    const w = toWorld(p.x, p.y);
    game.brush.x = w.x; game.brush.y = w.y;
    if (game.tool === 'inspect') {
      touchMode = 'pan';
    } else {
      touchMode = 'tool';
      game.brush.visible = true;
      pouring = true;
      game.pour(game.tool, w.x, w.y);
      pourCd = 0.08;
    }
  } else if (e.touches.length === 2) {
    pouring = false; game.brush.visible = false;
    touchMode = 'pinch';
    const a = touchPos(e.touches[0]), b = touchPos(e.touches[1]);
    lastMx = (a.x + b.x) / 2; lastMy = (a.y + b.y) / 2;
    pinchDist = Math.hypot(a.x - b.x, a.y - b.y);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchMode === 'pinch' && e.touches.length >= 2) {
    const a = touchPos(e.touches[0]), b = touchPos(e.touches[1]);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (pinchDist > 0) {
      const before = toWorld(mx, my);
      cam.zoom = Math.max(0.5, Math.min(5, cam.zoom * (d / pinchDist)));
      const after = toWorld(mx, my);
      cam.x += before.x - after.x;
      cam.y += before.y - after.y;
    }
    cam.x -= (mx - lastMx) / cam.zoom;
    cam.y -= (my - lastMy) / cam.zoom;
    clampCam();
    lastMx = mx; lastMy = my; pinchDist = d;
  } else if (touchMode && e.touches.length === 1) {
    const p = touchPos(e.touches[0]);
    if (Math.hypot(p.x - tapX, p.y - tapY) > 10) tapMoved = true;
    if (touchMode === 'pan') {
      cam.x -= (p.x - lastMx) / cam.zoom;
      cam.y -= (p.y - lastMy) / cam.zoom;
      clampCam();
    } else if (touchMode === 'tool') {
      const w = toWorld(p.x, p.y);
      game.brush.x = w.x; game.brush.y = w.y; game.brush.visible = true;
    }
    lastMx = p.x; lastMy = p.y;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) {
    // toque curto e parado com a lupa: seleciona a criatura tocada
    if (touchMode === 'pan' && !tapMoved && performance.now() - tapTime < 350) {
      selectCreature(pickCreature(toWorld(tapX, tapY)));
    }
    pouring = false; game.brush.visible = false; touchMode = null;
  } else if (e.touches.length === 1) {
    // saiu da pinça com um dedo ainda na tela: continua movendo a câmera
    const p = touchPos(e.touches[0]);
    lastMx = p.x; lastMy = p.y;
    touchMode = 'pan'; pouring = false; tapMoved = true;
  }
}, { passive: false });

canvas.addEventListener('touchcancel', () => {
  pouring = false; game.brush.visible = false; touchMode = null;
});

initUIOnce();
function initUIOnce() {
  // Game precisa existir antes do initUI (referências de brush/tool)
  startWorldBootstrap();
}
function startWorldBootstrap() {
  let seed = newSeed();
  game = new Game(seed, String(seed));
  window.__game = game;
  initUI(game, { onNewWorld: s => startWorld(s) });
  setGame(game);
  cam.x = game.first.x - canvas.width / 2 / cam.zoom;
  cam.y = game.first.y - canvas.height / 2 / cam.zoom;
  clampCam();
  game.feed(`🌱 O Primeiro, ${game.first.name}, surgiu no mundo (seed ${game.seedText})`, '#a0e8a0');
}

let last = performance.now(), simAcc = 0;
function frame(now) {
  const dtReal = Math.min(0.1, (now - last) / 1000);
  last = now;

  // despejo contínuo enquanto arrasta
  if (pouring && game.tool !== 'inspect') {
    pourCd -= dtReal;
    if (pourCd <= 0) { game.pour(game.tool, game.brush.x, game.brush.y); pourCd = 0.09; }
  }

  simAcc += dtReal * game.speed;
  let steps = 0;
  while (simAcc >= STEP && steps < 8) { game.tick(STEP); simAcc -= STEP; steps++; }
  if (steps === 8) simAcc = 0; // não deixa acumular atraso

  render(game, ctx, cam, now / 1000);
  updateHUD();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
})();
</script>

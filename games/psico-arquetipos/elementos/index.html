<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --chumbo:#14131A;
    --chumbo-luz:#24222D;
    --linha:#3A3742;
    --texto:#EDE9E3;
    --texto-fraco:#8E8A97;
    --fogo:#E2411E;
    --agua:#1D6F9C;
    --terra:#7A8B3A;
    --ar:#E6D9A8;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
    --display:'Fraunces',Georgia,serif;
    --corpo:'Karla',system-ui,sans-serif;
  }
  html{-webkit-text-size-adjust:100%;}
  html,body{background:var(--chumbo);color:var(--texto);font-family:var(--corpo);overscroll-behavior:none;}
  body{min-height:100dvh;}

  /* ---- gestão de telas ---- */
  .tela{display:none;min-height:100dvh;}
  .tela.ativa{display:block;}

  /* ---- toque (§6.4) ---- */
  .opcao{
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    cursor:pointer;
  }

  /* ---- foco visível ---- */
  :focus-visible{outline:2px solid var(--ar);outline-offset:2px;}

  /* ---- lang toggle ---- */
  #lang-toggle{position:fixed;top:max(12px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right));z-index:100;
    display:flex;align-items:center;gap:4px;background:var(--chumbo-luz);border:1px solid var(--linha);border-radius:20px;padding:4px 10px;font-family:var(--mono);font-size:13px;}
  .lang-btn{background:none;border:none;color:var(--texto-fraco);cursor:pointer;font:inherit;font-weight:600;padding:2px 4px;border-radius:4px;}
  .lang-btn.active{color:var(--ar);}
  .lang-sep{color:var(--linha);}

  /* ================= TELA INÍCIO ================= */
  #tela-inicio.ativa{
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    min-height:100dvh;
    padding:max(28px,env(safe-area-inset-top)) 26px max(28px,env(safe-area-inset-bottom));
  }
  .i-emoji{font-size:38px;margin-bottom:10px;}
  .i-kicker{font-family:var(--mono);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--texto-fraco);margin-bottom:14px;}
  .i-titulo{font-family:var(--display);font-weight:500;font-size:clamp(46px,17vw,74px);line-height:.98;letter-spacing:-1px;}
  .i-premissa{color:var(--texto-fraco);font-size:clamp(16px,4.4vw,18px);line-height:1.5;margin-top:20px;max-width:30ch;}

  .btn{
    min-height:54px;padding:15px 40px;border:none;border-radius:14px;
    background:var(--ar);color:var(--chumbo);
    font-family:var(--corpo);font-weight:600;font-size:18px;cursor:pointer;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    transition:transform .14s;
  }
  .btn:active{transform:scale(.97);}
  #btn-comecar{margin-top:34px;}
  .btn-sec{background:transparent;color:var(--texto);border:1.5px solid var(--linha);}

  /* ================= TELA QUESTÕES (§6.3) ================= */
  #tela-questoes.ativa{
    display:grid;grid-template-rows:auto 1fr auto;
    height:100dvh;gap:12px;
    padding:max(14px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-left)) max(16px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-right));
  }
  .q-topo{display:flex;align-items:center;gap:12px;}
  .q-prog{font-family:var(--mono);font-size:13px;color:var(--texto-fraco);letter-spacing:1px;white-space:nowrap;}
  .q-bar{flex:1;height:4px;background:var(--linha);border-radius:2px;overflow:hidden;}
  .q-bar-fill{height:100%;width:0;background:var(--ar);transition:width var(--anim,220ms) ease;}
  .q-meio{display:flex;align-items:center;justify-content:center;min-height:0;}
  .q-pergunta{
    font-family:var(--display);font-weight:500;
    font-size:clamp(21px,6.2vw,28px);line-height:1.22;text-align:center;max-width:22ch;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
    transition:opacity var(--anim,220ms) ease;
  }
  .q-baixo{display:flex;flex-direction:column;gap:12px;}
  .opcao{
    width:100%;min-height:clamp(80px,12dvh,102px);
    display:flex;align-items:center;justify-content:center;text-align:center;
    background:var(--chumbo-luz);border:1.5px solid var(--linha);border-radius:14px;color:var(--texto);
    font-family:var(--corpo);font-weight:400;font-size:clamp(16px,4.4vw,18px);line-height:1.32;
    padding:14px 18px;
    transition:border-color var(--anim,220ms) ease,background var(--anim,220ms) ease,transform .12s ease;
  }
  .opcao:active{border-color:var(--ar);}       /* feedback tátil imediato (0ms) */
  .opcao.escolhida{border-color:var(--ar);background:#2d2b37;}

  @media (max-height:480px){                    /* landscape de celular */
    #tela-questoes.ativa{gap:6px;
      padding-top:max(8px,env(safe-area-inset-top));padding-bottom:max(8px,env(safe-area-inset-bottom));}
    .q-pergunta{font-size:clamp(17px,5vw,22px);-webkit-line-clamp:3;}
    .opcao{min-height:clamp(52px,24dvh,72px);padding:8px 14px;}
  }

  /* ================= TELA RESULTADO (§5 / Etapa 5) ================= */
  #tela-resultado.ativa{
    display:block;min-height:100dvh;
    padding:max(24px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-left)) max(32px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-right));
  }
  .r-wrap{max-width:520px;margin:0 auto;text-align:center;}
  .r-regencia{font-family:var(--mono);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--texto-fraco);min-height:1em;margin-bottom:10px;}
  .r-nome{font-family:var(--display);font-weight:500;font-size:clamp(48px,16vw,72px);line-height:.98;letter-spacing:-1px;}
  .r-epiteto{font-family:var(--display);font-weight:500;font-style:italic;font-size:clamp(19px,5.4vw,24px);color:var(--texto-fraco);margin-top:4px;}
  .r-vitral-box{display:flex;justify-content:center;margin:22px 0 16px;}
  #vitral{display:block;}
  .r-pcts{display:flex;justify-content:center;flex-wrap:wrap;gap:14px 22px;font-family:var(--mono);font-size:13px;color:var(--texto-fraco);margin-bottom:26px;}
  .r-pct{display:flex;align-items:center;gap:6px;}
  .r-pct .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}
  .r-essencia{font-size:clamp(17px,4.6vw,19px);line-height:1.55;text-align:left;margin-bottom:24px;}
  .r-bloco{text-align:left;margin-bottom:20px;}
  .r-bloco p{font-size:clamp(15px,4.2vw,17px);line-height:1.5;color:var(--texto);}
  .r-label{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--texto-fraco);margin-bottom:6px;}
  .r-cego{background:var(--chumbo-luz);border:1px solid var(--linha);border-radius:12px;padding:16px 18px;}
  .r-botoes{display:flex;flex-direction:column;gap:12px;margin:30px 0 18px;}
  .r-rodape{font-family:var(--mono);font-size:12px;color:var(--texto-fraco);letter-spacing:.5px;}
  #toast{position:fixed;left:50%;bottom:max(24px,env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--texto);color:var(--chumbo);font-weight:600;font-size:14px;padding:11px 20px;border-radius:22px;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #salvar-fallback{position:fixed;inset:0;background:rgba(10,9,14,.94);z-index:300;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
  #salvar-fallback[hidden]{display:none;}
  #salvar-fallback-msg{color:var(--texto);font-size:16px;text-align:center;max-width:24ch;}
  #salvar-fallback-img{max-width:min(80vw,340px);height:auto;border-radius:10px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>
<div id="lang-toggle" aria-label="Switch language">
  <button id="btn-en" class="lang-btn active" onclick="setLang('en')">EN</button>
  <span class="lang-sep">|</span>
  <button id="btn-pt" class="lang-btn" onclick="setLang('pt')">PT</button>
</div>

<section id="tela-inicio" class="tela ativa">
  <div class="i-emoji">🜂</div>
  <div class="i-kicker" data-i18n="kicker">Psycho Archetypes</div>
  <h1 class="i-titulo" data-i18n="inicioTitulo">Elements</h1>
  <p class="i-premissa" data-i18n="premissa">Six pairs of choices. No right answer. In the end, what you are made of.</p>
  <button class="btn" id="btn-comecar" type="button" data-i18n="comecar">Start</button>
</section>

<section id="tela-questoes" class="tela">
  <div class="q-topo">
    <div class="q-prog" id="q-prog">01 / 24</div>
    <div class="q-bar"><div class="q-bar-fill" id="q-bar-fill"></div></div>
  </div>
  <div class="q-meio">
    <p class="q-pergunta" id="q-pergunta"></p>
  </div>
  <div class="q-baixo">
    <button class="opcao" id="opcao-a" type="button"><span class="opcao-txt"></span></button>
    <button class="opcao" id="opcao-b" type="button"><span class="opcao-txt"></span></button>
  </div>
</section>

<section id="tela-resultado" class="tela">
  <div class="r-wrap">
    <div class="r-regencia" id="r-regencia"></div>
    <h1 class="r-nome" id="r-nome"></h1>
    <div class="r-epiteto" id="r-epiteto"></div>
    <div class="r-vitral-box">
      <canvas id="vitral" aria-hidden="true"></canvas>
    </div>
    <div class="r-pcts" id="r-pcts"></div>
    <p class="r-essencia" id="r-essencia"></p>
    <div class="r-bloco"><div class="r-label" id="r-label-luz"></div><p id="r-luz"></p></div>
    <div class="r-bloco"><div class="r-label" id="r-label-sombra"></div><p id="r-sombra"></p></div>
    <div class="r-bloco"><div class="r-label" id="r-label-deseq"></div><p id="r-deseq"></p></div>
    <div class="r-bloco r-cego"><div class="r-label" id="r-label-cego"></div><p id="r-cego"></p></div>
    <div class="r-botoes">
      <button class="btn" id="btn-salvar" type="button" data-i18n="salvar">Save image</button>
      <button class="btn btn-sec" id="btn-refazer" type="button" data-i18n="refazer">Retake the test</button>
    </div>
    <div class="r-rodape">estel.games/psico-arquetipos</div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <div id="salvar-fallback" hidden>
    <p id="salvar-fallback-msg"></p>
    <img id="salvar-fallback-img" alt="">
  </div>
</section>

<script>
"use strict";

// ==================== CONFIG (§2.2) ====================
const CFG = {
  TOTAL_QUESTOES: 24,
  PONTOS_MAX: 36,            // soma de todos os pesos (12 questões peso 1 + 12 peso 2)
  TETO_ELEMENTO: 18,         // máximo teórico por elemento (3 pares × 6 pts) = 50%
  LIMIAR_PURO_PTS: 4,        // E1 - E2 >= 4 pts (≈11,1 p.p.) => arquétipo puro
  ORDEM_DESEMPATE: ['fogo', 'agua', 'terra', 'ar'],
  EMBARALHAR_QUESTOES: true, // ordem das 24 questões
  EMBARALHAR_LADOS: true,    // qual elemento aparece como opção A/B
  ANIM_MS: 220,
  GA_ID: 'G-ENR25YEZMV'
};

// ==================== MODELO (§2.1 / §2.5) ====================
const ELEMENTOS = ['fogo', 'agua', 'terra', 'ar'];

const ARQUETIPOS = {
  'fogo+ar':    'faisca',
  'fogo+agua':  'vapor',
  'fogo+terra': 'forja',
  'agua+ar':    'bruma',
  'agua+terra': 'argila',
  'terra+ar':   'cristal'
};

// ==================== BANCO DE QUESTÕES (§3) ====================
const QUESTOES = [
  // ---------- FOGO × ÁGUA ----------
  { id:'q01', pair:['fogo','agua'], w:1,
    pt:{ q:'Alguém te magoou de verdade. Uma semana depois:',
         a:'Você já falou o que tinha pra falar.',
         b:'Você ainda está remoendo a cena.' },
    en:{ q:'Someone really hurt you. A week later:',
         a:'You already said what you had to say.',
         b:'You are still replaying the scene.' } },

  { id:'q02', pair:['fogo','agua'], w:2,
    pt:{ q:'Uma decisão difícil está na sua mão. O que pesa mais?',
         a:'O que eu quero.',
         b:'Quem vai ser afetado.' },
    en:{ q:'A hard call is yours to make. What weighs more?',
         a:'What I want.',
         b:'Who gets affected.' } },

  { id:'q03', pair:['fogo','agua'], w:1,
    pt:{ q:'Num filme, o que te prende:',
         a:'A cena em que tudo explode.',
         b:'A cena em que ninguém diz nada.' },
    en:{ q:'In a film, what holds you:',
         a:'The scene where everything blows up.',
         b:'The scene where nobody says a word.' } },

  { id:'q04', pair:['fogo','agua'], w:2,
    pt:{ q:'Você está mal. O que ajuda mais:',
         a:'Fazer alguma coisa. Qualquer coisa.',
         b:'Alguém sentar do seu lado.' },
    en:{ q:'You are in a bad place. What helps more:',
         a:'Doing something. Anything.',
         b:'Someone sitting next to you.' } },

  // ---------- FOGO × TERRA ----------
  { id:'q05', pair:['fogo','terra'], w:1,
    pt:{ q:'Um plano de seis meses caiu na sua mesa:',
         a:'Começa hoje e ajusta no caminho.',
         b:'Mapeia tudo antes de mover um dedo.' },
    en:{ q:'A six-month plan lands on your desk:',
         a:'Start today, adjust along the way.',
         b:'Map it all out before moving a finger.' } },

  { id:'q06', pair:['fogo','terra'], w:2,
    pt:{ q:'Você confia mais:',
         a:'No impulso do momento.',
         b:'No que já deu certo antes.' },
    en:{ q:'You trust more:',
         a:'The impulse of the moment.',
         b:'What has worked before.' } },

  { id:'q07', pair:['fogo','terra'], w:1,
    pt:{ q:'O defeito mais imperdoável:',
         a:'Ser lento.',
         b:'Ser inconstante.' },
    en:{ q:'The least forgivable flaw:',
         a:'Being slow.',
         b:'Being unreliable.' } },

  { id:'q08', pair:['fogo','terra'], w:2,
    pt:{ q:'Oportunidade boa, arriscada, e o prazo é hoje:',
         a:'Aceita e resolve depois.',
         b:'Deixa passar. A conta não fecha.' },
    en:{ q:'A good, risky opportunity — and the deadline is today:',
         a:'Take it, figure it out later.',
         b:'Let it go. The math does not add up.' } },

  // ---------- FOGO × AR ----------
  { id:'q09', pair:['fogo','ar'], w:1,
    pt:{ q:'Uma ideia nova te ocorre. Primeiro impulso:',
         a:'Testar agora.',
         b:'Ver aonde ela chega se eu continuar pensando.' },
    en:{ q:'A new idea hits you. First impulse:',
         a:'Test it now.',
         b:'See where it goes if I keep thinking.' } },

  { id:'q10', pair:['fogo','ar'], w:2,
    pt:{ q:'Numa discussão, você quer:',
         a:'Vencer.',
         b:'Entender.' },
    en:{ q:'In an argument, you want to:',
         a:'Win.',
         b:'Understand.' } },

  { id:'q11', pair:['fogo','ar'], w:1,
    pt:{ q:'O que dá mais prazer:',
         a:'Fazer acontecer.',
         b:'Sacar como funciona.' },
    en:{ q:'What feels better:',
         a:'Making it happen.',
         b:'Figuring out how it works.' } },

  { id:'q12', pair:['fogo','ar'], w:2,
    pt:{ q:'Você abandonaria um plano ótimo por:',
         a:'Um impulso mais forte.',
         b:'Um argumento melhor.' },
    en:{ q:'You would drop a great plan for:',
         a:'A stronger impulse.',
         b:'A better argument.' } },

  // ---------- ÁGUA × TERRA ----------
  { id:'q13', pair:['agua','terra'], w:1,
    pt:{ q:'Um amigo chega arrasado. Você:',
         a:'Escuta até ele parar de falar.',
         b:'Resolve o problema prático que causou aquilo.' },
    en:{ q:'A friend shows up wrecked. You:',
         a:'Listen until they stop talking.',
         b:'Fix the practical problem that caused it.' } },

  { id:'q14', pair:['agua','terra'], w:2,
    pt:{ q:'O que prova amor:',
         a:'Dizer.',
         b:'Fazer.' },
    en:{ q:'What proves love:',
         a:'Saying it.',
         b:'Doing it.' } },

  { id:'q15', pair:['agua','terra'], w:1,
    pt:{ q:'Você guarda:',
         a:'Cartas, fotos, coisas sem valor.',
         b:'Ferramentas, peças, coisas que servem.' },
    en:{ q:'You keep:',
         a:'Letters, photos, things with no value.',
         b:'Tools, parts, things that are useful.' } },

  { id:'q16', pair:['agua','terra'], w:2,
    pt:{ q:'Uma promessa que ficou difícil de cumprir:',
         a:'Eu explico o que mudou dentro de mim.',
         b:'Eu cumpro, mesmo sem vontade.' },
    en:{ q:'A promise that became hard to keep:',
         a:'I explain what changed inside me.',
         b:'I keep it anyway, without wanting to.' } },

  // ---------- ÁGUA × AR ----------
  { id:'q17', pair:['agua','ar'], w:1,
    pt:{ q:'Você entende as pessoas:',
         a:'Pelo que elas te fazem sentir.',
         b:'Pelos padrões que elas repetem.' },
    en:{ q:'You read people:',
         a:'By what they make you feel.',
         b:'By the patterns they repeat.' } },

  { id:'q18', pair:['agua','ar'], w:2,
    pt:{ q:'Sobre a sua própria emoção:',
         a:'Eu mergulho nela.',
         b:'Eu observo ela de fora.' },
    en:{ q:'About your own emotion:',
         a:'I dive into it.',
         b:'I watch it from outside.' } },

  { id:'q19', pair:['agua','ar'], w:1,
    pt:{ q:'Um poema é bom quando:',
         a:'Aperta o peito.',
         b:'Vira uma chave na cabeça.' },
    en:{ q:'A poem is good when:',
         a:'It hits you in the chest.',
         b:'It flips a switch in your head.' } },

  { id:'q20', pair:['agua','ar'], w:2,
    pt:{ q:'Você confia mais:',
         a:'No que sente sem saber por quê.',
         b:'No que conclui, mesmo contra o que sente.' },
    en:{ q:'You trust more:',
         a:'What you feel without knowing why.',
         b:'What you conclude, even against what you feel.' } },

  // ---------- TERRA × AR ----------
  { id:'q21', pair:['terra','ar'], w:1,
    pt:{ q:'Uma teoria linda que não funciona na prática:',
         a:'É lixo.',
         b:'Ainda vale.' },
    en:{ q:'A beautiful theory that does not work in practice:',
         a:'It is garbage.',
         b:'It still counts.' } },

  { id:'q22', pair:['terra','ar'], w:2,
    pt:{ q:'Se só desse pra ter um:',
         a:'Terminar.',
         b:'Entender.' },
    en:{ q:'If you could only have one:',
         a:'Finishing it.',
         b:'Understanding it.' } },

  { id:'q23', pair:['terra','ar'], w:1,
    pt:{ q:'Sua mesa:',
         a:'Cada coisa no seu lugar.',
         b:'Um caos que só eu entendo.' },
    en:{ q:'Your desk:',
         a:'Everything in its place.',
         b:'A mess only I understand.' } },

  { id:'q24', pair:['terra','ar'], w:2,
    pt:{ q:'O que faz um trabalho ser bom:',
         a:'Ele resiste ao tempo.',
         b:'Ele muda como as pessoas pensam.' },
    en:{ q:'What makes work good:',
         a:'It survives time.',
         b:'It changes how people think.' } }
];

// ==================== TEXTOS DE RESULTADO (§4) ====================
const RESULTADOS = {

  // ==================== PUROS ====================

  fogo: {
    pt:{ nome:'Fogo', epiteto:'A Vontade',
      essencia:'Você move antes de saber para onde. O que te define não é o destino, é a partida.',
      luz:'Coragem, iniciativa, a capacidade rara de fazer as coisas saírem do papel só porque você não aguenta esperar.',
      sombra:'Impaciência com quem precisa de tempo. Arrogância vestida de convicção. Destruir o que ainda estava crescendo.',
      desequilibrio:'Qualquer forma de espera. Você confunde parar com morrer.',
      cego:'Água. Você trata sentimento como atraso — inclusive o seu.' },
    en:{ nome:'Fire', epiteto:'The Will',
      essencia:'You move before you know where to. What defines you is not the destination, it is the departure.',

// ---- validação obrigatória (§3) ----
(function validarBanco(){
  const porPar = {};
  const porElemento = {fogo:0, agua:0, terra:0, ar:0};
  let somaW = 0;
  QUESTOES.forEach(q=>{
    const chavePar = q.pair.slice().sort().join('+');
    (porPar[chavePar] = porPar[chavePar] || []).push(q.w);
    somaW += q.w;
    q.pair.forEach(el=>{ porElemento[el]++; });
  });
  console.assert(QUESTOES.length === CFG.TOTAL_QUESTOES, 'total de questões != 24');
  console.assert(somaW === CFG.PONTOS_MAX, 'soma dos pesos != 36');
  Object.keys(porPar).forEach(par=>{
    const pesos = porPar[par].slice().sort().join(',');
    console.assert(porPar[par].length === 4, 'par '+par+' não tem 4 questões');
    console.assert(pesos === '1,1,2,2', 'par '+par+' pesos != [1,1,2,2]');
  });
  ELEMENTOS.forEach(el=>{
    console.assert(porElemento[el] === 12, 'elemento '+el+' não aparece 12 vezes');
  });
})();

// ==================== MOTOR DE PONTUAÇÃO (§2.3/§2.4/§2.6) ====================
const OPOSTO = { fogo:'agua', agua:'fogo', terra:'ar', ar:'terra' };
const ARQ_PARA_PAR = {}; // 'faisca' -> ['fogo','ar']
Object.keys(ARQUETIPOS).forEach(k=>{ ARQ_PARA_PAR[ARQUETIPOS[k]] = k.split('+'); });

// estado: vetor de pontos + acumulador paralelo só de peso 2 (desempate)
const estado = {
  pontos:   { fogo:0, agua:0, terra:0, ar:0 },
  pontosW2: { fogo:0, agua:0, terra:0, ar:0 },
  respostas: 0
};
function resetEstado(){
  ELEMENTOS.forEach(el=>{ estado.pontos[el]=0; estado.pontosW2[el]=0; });
  estado.respostas = 0;
}
function registrarEscolha(elementoEscolhido, w){
  estado.pontos[elementoEscolhido] += w;
  if(w === 2) estado.pontosW2[elementoEscolhido] += w;
  estado.respostas++;
}

// ordena [a,b] pela ORDEM_DESEMPATE e consulta o mapa de intersecções
function arqId(a, b){
  const par = [a, b].slice().sort((m,n)=>
    CFG.ORDEM_DESEMPATE.indexOf(m) - CFG.ORDEM_DESEMPATE.indexOf(n));
  return ARQUETIPOS[par[0] + '+' + par[1]];
}

// §2.4 — classifica em puro ou intersecção, com desempate determinístico
function classificar(pontos, pontosW2){
  const ordenado = ELEMENTOS.slice().sort((a,b)=>{
    if(pontos[b] !== pontos[a]) return pontos[b] - pontos[a];           // 1) pontos
    if(pontosW2[b] !== pontosW2[a]) return pontosW2[b] - pontosW2[a];   // 2) peso 2
    return CFG.ORDEM_DESEMPATE.indexOf(a) - CFG.ORDEM_DESEMPATE.indexOf(b); // 3) ordem canônica
  });
  const E1 = ordenado[0], E2 = ordenado[1];
  if(pontos[E1] - pontos[E2] >= CFG.LIMIAR_PURO_PTS){
    return { tipo:'puro', chave:E1, regente:E1, arq:null, e1:E1, e2:E2, ordenado };
  }
  const arq = arqId(E1, E2);
  return { tipo:'interseccao', chave:arq + '_' + E1, regente:E1, arq, e1:E1, e2:E2, ordenado };
}

// §2.3 — percentuais que sempre somam 100 (ajuste no maior)
function percentuais(pontos){
  const rounded = {};
  ELEMENTOS.forEach(el=>{ rounded[el] = Math.round(pontos[el] / CFG.PONTOS_MAX * 100); });
  const soma = ELEMENTOS.reduce((s,el)=> s + rounded[el], 0);
  const diff = 100 - soma;
  if(diff !== 0){
    // ajusta o maior (por pontos; empate pela ordem canônica)
    const alvo = ELEMENTOS.slice().sort((a,b)=>
      pontos[b] - pontos[a] ||
      (CFG.ORDEM_DESEMPATE.indexOf(a) - CFG.ORDEM_DESEMPATE.indexOf(b)))[0];
    rounded[alvo] += diff;
  }
  return rounded;
}

// §2.6 — mapa de pontos cegos entre intersecções.
// Faísca↔Argila, Forja↔Bruma são opostos elemento-a-elemento.
// Vapor(Fogo+Água) e Cristal(Terra+Ar) são eixos de oposição inteiros —
// arquétipos de tensão interna — e por isso apontam um para o outro.
const CEGO_ARQ = {
  faisca:'argila', argila:'faisca',
  forja:'bruma',   bruma:'forja',
  vapor:'cristal', cristal:'vapor'
};

// §2.6 — ponto cego (arquétipo genérico oposto)
function pontoCego(cls){
  if(cls.tipo === 'puro'){
    const op = OPOSTO[cls.regente];
    return { tipo:'puro', id:op, nome:(l)=>RESULTADOS[op][l].nome };
  }
  const arqOp = CEGO_ARQ[cls.arq];               // ex.: 'faisca' -> 'argila'
  const genericKey = arqOp + '_' + ARQ_PARA_PAR[arqOp][0]; // nome igual nas duas regências
  return { tipo:'interseccao', arq:arqOp, nome:(l)=>RESULTADOS[genericKey][l].nome };
}

// ==================== FLUXO DE UI ====================
document.documentElement.style.setProperty('--anim', CFG.ANIM_MS + 'ms');

// estado de sessão do teste
let ordem = [];        // [{q, flip}]
let idx = 0;           // questão atual
let travado = false;   // trava de input (§6.4)
let clsAtual = null;   // classificação do resultado
let pctAtual = null;

function embaralhar(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function mostrarTela(nome){
  document.querySelectorAll('.tela').forEach(s=> s.classList.remove('ativa'));
  document.getElementById('tela-' + nome).classList.add('ativa');
}

function iniciarTeste(){
  resetEstado();
  const base = CFG.EMBARALHAR_QUESTOES ? embaralhar(QUESTOES) : QUESTOES.slice();
  ordem = base.map(q=>({ q, flip: CFG.EMBARALHAR_LADOS ? Math.random() < 0.5 : false }));
  idx = 0;
  travado = false;
  if(typeof gaEvento === 'function') gaEvento('teste_iniciado', { teste:'elementos' });
  mostrarTela('questoes');
  renderQuestao();
}

// tupla exibida em cada botão, respeitando flip e idioma atual
function ladosDe(item){
  const q = item.q;
  const topo = item.flip ? { el:q.pair[1], txt:q[_lang].b } : { el:q.pair[0], txt:q[_lang].a };
  const baixo = item.flip ? { el:q.pair[0], txt:q[_lang].a } : { el:q.pair[1], txt:q[_lang].b };
  return { topo, baixo };
}

function renderQuestao(){
  const item = ordem[idx];
  const q = item.q;
  const n = String(idx + 1).padStart(2, '0');
  document.getElementById('q-prog').textContent = n + ' / ' + CFG.TOTAL_QUESTOES;
  document.getElementById('q-bar-fill').style.width = ((idx) / CFG.TOTAL_QUESTOES * 100) + '%';
  document.getElementById('q-pergunta').textContent = q[_lang].q;
  const { topo, baixo } = ladosDe(item);
  const a = document.getElementById('opcao-a'), b = document.getElementById('opcao-b');
  a.querySelector('.opcao-txt').textContent = topo.txt;
  b.querySelector('.opcao-txt').textContent = baixo.txt;
  a.classList.remove('escolhida'); b.classList.remove('escolhida');
}

function escolher(posicao){          // posicao: 'a' | 'b'
  if(travado) return;                // §6.4 trava de input
  travado = true;
  const item = ordem[idx];
  const { topo, baixo } = ladosDe(item);
  const escolhido = posicao === 'a' ? topo : baixo;
  registrarEscolha(escolhido.el, item.q.w);
  document.getElementById('opcao-' + posicao).classList.add('escolhida');
  if(navigator.vibrate) navigator.vibrate(8);
  document.getElementById('q-bar-fill').style.width = ((idx + 1) / CFG.TOTAL_QUESTOES * 100) + '%';
  setTimeout(()=>{
    idx++;
    if(idx >= ordem.length){
      finalizar();
    } else {
      renderQuestao();
    }
    travado = false;
  }, CFG.ANIM_MS + 40);
}

function finalizar(){
  clsAtual = classificar(estado.pontos, estado.pontosW2);
  pctAtual = percentuais(estado.pontos);
  mostrarTela('resultado');
  if(typeof renderResultado === 'function') renderResultado(clsAtual, pctAtual);
}

// ---- i18n / troca de idioma ----
function setLang(lang){
  _lang = lang;
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  document.title = T('title');
  const md = document.querySelector('meta[name="description"]');
  if(md) md.content = T('metaDesc');
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.dataset.i18n;
    if(I18N[lang][key] !== undefined) el.textContent = I18N[lang][key];
  });
  document.getElementById('btn-pt').classList.toggle('active', lang === 'pt');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  // re-render conteúdo dinâmico da tela atual
  if(document.getElementById('tela-questoes').classList.contains('ativa') && ordem.length){
    renderQuestao();
  }
  if(document.getElementById('tela-resultado').classList.contains('ativa') && clsAtual && typeof renderResultado === 'function'){
    renderResultado(clsAtual, pctAtual);
  }
}

// ---- wiring ----
document.getElementById('btn-comecar').addEventListener('click', iniciarTeste);
document.getElementById('opcao-a').addEventListener('click', ()=> escolher('a'));
document.getElementById('opcao-b').addEventListener('click', ()=> escolher('b'));
document.getElementById('btn-refazer').addEventListener('click', ()=>{
  clsAtual = null; pctAtual = null;
  mostrarTela('inicio');
});

(function initLang(){
  const detected = navigator.language && navigator.language.startsWith('pt') ? 'pt' : 'en';
  setLang(detected);
})();

// ==================== VITRAL + CARD (§5/§6) ====================
const CORES = { fogo:'#E2411E', agua:'#1D6F9C', terra:'#7A8B3A', ar:'#E6D9A8' };
const DIRS  = { fogo:[0,-1], agua:[1,0], terra:[0,1], ar:[-1,0] }; // fogo↑ agua→ terra↓ ar←
const ORDEM_VITRAL = ['fogo', 'agua', 'terra', 'ar'];

function hexA(hex, a){
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')';
}

// desenha o vitral: quadrilátero de vidro, vértices proporcionais ao pct,
// preenchimento com as 4 cores ponderadas, contorno grosso de chumbo.
function desenharVitral(canvas, pct, cssSize){
  const dpr = Math.min(window.devicePixelRatio || 1, 3);      // §6.7
  const S = cssSize;
  canvas.width  = Math.round(S * dpr);
  canvas.height = Math.round(S * dpr);
  canvas.style.width  = S + 'px';
  canvas.style.height = S + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, S, S);

  const cx = S/2, cy = S/2;
  const R = S * 0.42, Rmin = R * 0.14;
  const verts = {};
  ELEMENTOS.forEach(el=>{
    const r = Rmin + (R - Rmin) * (pct[el] / 50);            // 50% (teto) alcança R
    verts[el] = [cx + DIRS[el][0] * r, cy + DIRS[el][1] * r];
  });
  const tracarPoligono = ()=>{
    ctx.beginPath();
    ORDEM_VITRAL.forEach((el,i)=>{ const [x,y]=verts[el]; i ? ctx.lineTo(x,y) : ctx.moveTo(x,y); });
    ctx.closePath();
  };

  // vidro: fundo + 4 gradientes somados (lighter) recortados pelo polígono
  tracarPoligono();
  ctx.save();
  ctx.clip();
  ctx.fillStyle = '#201E28';
  ctx.fillRect(0, 0, S, S);
  ctx.globalCompositeOperation = 'lighter';
  ORDEM_VITRAL.forEach(el=>{
    const [vx,vy] = verts[el];
    const w = Math.max(0.18, pct[el] / 50);
    const g = ctx.createRadialGradient(vx, vy, 0, vx, vy, R * 1.25);
    g.addColorStop(0, hexA(CORES[el], 0.30 + 0.55 * w));
    g.addColorStop(1, hexA(CORES[el], 0));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, S, S);
  });
  ctx.restore();

  // cames de chumbo: linhas finas do centro a cada vértice
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = 'rgba(58,55,66,0.7)';
  ctx.lineWidth = Math.max(1, S * 0.006);
  ORDEM_VITRAL.forEach(el=>{
    const [x,y] = verts[el];
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
  });

  // contorno grosso (o chumbo)
  tracarPoligono();
  ctx.lineWidth = Math.max(3, S * 0.02);
  ctx.strokeStyle = '#3A3742';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // nós de vidro nos vértices
  ORDEM_VITRAL.forEach(el=>{
    const [x,y] = verts[el];
    ctx.beginPath();
    ctx.arc(x, y, Math.max(2.5, S * 0.014), 0, Math.PI * 2);
    ctx.fillStyle = CORES[el];
    ctx.fill();
    ctx.lineWidth = Math.max(1, S * 0.006);
    ctx.strokeStyle = '#14131A';
    ctx.stroke();
  });
}

function renderResultado(cls, pct){
  const r = RESULTADOS[cls.chave][_lang];

  // regência (omitida nos puros — §5 / critério 6)
  const elReg = document.getElementById('r-regencia');
  if(cls.tipo === 'interseccao'){
    const nomeReg = RESULTADOS[cls.regente][_lang].nome;
    elReg.textContent = T('regidoPor').replace('{el}', nomeReg);
    elReg.style.display = '';
  } else {
    elReg.textContent = '';
    elReg.style.display = 'none';
  }

  document.getElementById('r-nome').textContent = r.nome;
  document.getElementById('r-epiteto').textContent = r.epiteto;

  // vitral
  const size = Math.min(280, window.innerWidth - 72);
  desenharVitral(document.getElementById('vitral'), pct, size);

  // percentuais em mono, ordem canônica, com ponto colorido
  const pctBox = document.getElementById('r-pcts');
  pctBox.innerHTML = '';
  ELEMENTOS.forEach(el=>{
    const nome = T('eixo' + el.charAt(0).toUpperCase() + el.slice(1));
    const span = document.createElement('span');
    span.className = 'r-pct';
    span.innerHTML = '<span class="dot" style="background:' + CORES[el] + '"></span>' + nome + ' ' + pct[el] + '%';
    pctBox.appendChild(span);
  });

  document.getElementById('r-essencia').textContent = r.essencia;
  document.getElementById('r-label-luz').textContent = T('labelLuz');
  document.getElementById('r-luz').textContent = r.luz;
  document.getElementById('r-label-sombra').textContent = T('labelSombra');
  document.getElementById('r-sombra').textContent = r.sombra;
  document.getElementById('r-label-deseq').textContent = T('labelDesequilibrio');
  document.getElementById('r-deseq').textContent = r.desequilibrio;
  document.getElementById('r-label-cego').textContent = T('labelCego');
  document.getElementById('r-cego').textContent = r.cego;

  window.scrollTo(0, 0);
}
